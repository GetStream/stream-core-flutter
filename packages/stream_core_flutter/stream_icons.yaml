# Stream Icons Generator Configuration
#
# Run: melos run generate:icons
#
# Source SVGs come from:
# https://github.com/GetStream/design-system-tokens/tree/main/assets/icons

# Input
input_svg_dir: assets_source/icons/
input_svg_icon_dir: assets/icons/

# Output paths (relative to this config file)
output_font_file: lib/fonts/stream_icons_font.otf
output_file: lib/src/theme/primitives/stream_icons.dart
output_data_file: lib/src/theme/primitives/stream_icons.g.dart
output_log_file: assets_source/icon_log.g.txt

# Class names
class_name: StreamIcons
data_class_name: StreamIconData
svg_icon_data_class_name: StreamSvgIconData
package: stream_core_flutter

# Font options
font_name: Stream Icons

# Preserve each glyph's position as authored in its SVG. The default
# (`normalize: true`) re-centers every glyph by its bounding box, which silently
# undoes deliberate optical offsets — e.g. the `play-fill` triangle is nudged
# right inside its viewBox so it reads as centered to the eye.
#
# Note: The generator warns about mixed viewBox sizes (from the `16/` and `32/`
# folders). Those are intentional size-specific variants and safe to ignore.
normalize: false
